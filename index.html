function appendMoMessage(feedId, type, text, label = null, kind = 'material', willPause = false, illustrationKey = null, textAfterImage = null) {
  const feed = document.getElementById(feedId);
  const msg = document.createElement('div');

  if (label) {
    msg.className = `msg content-block ${kind}`;
    const labelEl = document.createElement('span');
    labelEl.className = 'content-block-label';
    labelEl.textContent = label;
    const body = document.createElement('div');
    body.className = 'msg-body';

    // scroll-zone wraps body (+ chat when it appears)
    const scrollZone = document.createElement('div');
    scrollZone.className = 'scroll-zone';
    const scrollContent = document.createElement('div');
    scrollContent.className = 'scroll-content';
    scrollContent.appendChild(body);
    // Inline illustration (if any) goes after the initial text
    if (illustrationKey) {
      const illusContainer = document.createElement('div');
      scrollContent.appendChild(illusContainer);
      // We'll insert the SVG after typing completes
      scrollContent._illusContainer = illusContainer;
      scrollContent._illusKey = illustrationKey;
    }
    if (textAfterImage) {
      const afterBody = document.createElement('div');
      afterBody.className = 'msg-body text-after-image';
      scrollContent.appendChild(afterBody);
      scrollContent._afterBody = afterBody;
      scrollContent._afterText = textAfterImage;
    }
    scrollZone.appendChild(scrollContent);

    msg.appendChild(labelEl);
    msg.appendChild(scrollZone);
    feed.appendChild(msg);
    contentIn(msg);
    const btnReserve = willPause ? 100 : 0; // reserve space for gap + continue-btn + gap to next block
    setActive(feed, msg, btnReserve);
    if (willPause) setBlockFocus(feed, msg);
    return typeInto(body, text).then(async () => {
      // Render illustration if present
      if (scrollContent._illusKey) {
        appendIllustration(scrollContent._illusContainer, scrollContent._illusKey);
        setActive(feed, msg, btnReserve);
        await delay(300);
      }
      // Type textAfterImage if present
      if (scrollContent._afterBody && scrollContent._afterText) {
        await typeInto(scrollContent._afterBody, scrollContent._afterText);
      }
      setActive(feed, msg, btnReserve);
      if (!willPause) return;

      // Chat container lives inside scroll-zone so it scrolls with the content
      const chatEl = document.createElement('div');
      chatEl.className = 'material-chat';
      chatEl.style.display = 'none'; // hidden until first message
      scrollContent.appendChild(chatEl);
      activeMaterialBlock = { feedId, chatEl, scrollZone };

      // Global input bar — shown at card bottom, persists during scroll
      showBlockInput(feedId, 'Ask anything…', async (raw) => {
        if (!activeMaterialBlock) return;
        const { chatEl: ce, scrollZone: sz } = activeMaterialBlock;
        if (ce.style.display === 'none') ce.style.display = 'flex';

        const userBubble = document.createElement('div');
        userBubble.className = 'q-user-bubble';
        userBubble.textContent = raw;
        ce.appendChild(userBubble);
        bounceIn(userBubble);
        sz.scrollTop = sz.scrollHeight;

        await delay(350);

        const reply = MO_CHAT_REPLIES[Math.floor(Math.random() * MO_CHAT_REPLIES.length)];
        const replyEl = document.createElement('div');
        replyEl.className = 'material-chat-reply';
        ce.appendChild(replyEl);
        bounceIn(replyEl);
        await typeInto(replyEl, reply);
        sz.scrollTop = sz.scrollHeight;
      });
    });
  }

  // Default: MO // style
  msg.className = `msg ${type}`;
  const header = document.createElement('div');
  header.className = 'msg-mo-header';
  header.innerHTML = `<div class="mo-dot"></div><span class="mo-tag">MO //</span>`;
  const body = document.createElement('div');
  body.className = 'msg-body';
  msg.appendChild(header);
  msg.appendChild(body);
  feed.appendChild(msg);
  bounceIn(msg);
  setActive(feed, msg);
  return typeInto(body, text).then(() => setActive(feed, msg));
}

async function handleFreeTextAnswer(chapterIdx, stepIdx, userText) {
  activeQuestion = null;

  const step = CHAPTERS[chapterIdx].steps[stepIdx];
  const feed = document.getElementById(`feed-${chapterIdx}`);
  const group = document.getElementById(`qgroup-${chapterIdx}-${stepIdx}`);
  const qFull = group.querySelector('.q-full');

  // Show user bubble inside the question card
  const bubble = document.createElement('div');
  bubble.className = 'q-user-bubble';
  bubble.textContent = userText;
  qFull.appendChild(bubble);
  const qb = group.querySelector('.question-block');
  if (qb) qb.scrollTop = qb.scrollHeight;

  await delay(500);

  const lower = userText.toLowerCase();
  const isCorrect = step.keywords.some(k => lower.includes(k));

  if (isCorrect) {
    await appendFeedbackToGroup(group, 'correct', 'Correct', step.correctResponse);
    completedQuestions[chapterIdx]++;
    markSegment(chapterIdx);
    advanceProgress(chapterIdx);

    // Show continue button with 3-second countdown timer
    await awaitContinueTimer(group, 3000);

    const answerEl = document.getElementById(`qanswer-${chapterIdx}-${stepIdx}`);
    if (answerEl) answerEl.textContent = step.text.replace(/\?$/, '') + ': ' + userText.toLowerCase();
    // Collapse question card
    hideGlobalInput(`feed-${chapterIdx}`);
    group.classList.remove('in-focus');
    group.style.flex = '';
    group.classList.add('collapsed');
    group.addEventListener('click', () => group.classList.toggle('open'));

    await delay(300);
    group._resolve && group._resolve();
  } else {
    await appendFeedbackToGroup(group, 'wrong', 'Not quite', step.incorrectResponse);
    await delay(400);
    // Re-enable for another try
    activeQuestion = { chapterIdx, stepIdx, freetext: true };
  }
}

    const optionIdx = ['A','B','C','D'].indexOf(letter);
    if (activeQuestion && optionIdx !== -1 && raw.length === 1) {
      const { prevWrong } = activeQuestion;
      if (optionIdx < step.options.length && !prevWrong.includes(optionIdx)) {

    if (group.classList.contains('collapsed')) return;

function renderOptions(chapterIdx, stepIdx, usedWrong) {
  const step = CHAPTERS[chapterIdx].steps[stepIdx];
  const block = document.getElementById(`qblock-${chapterIdx}-${stepIdx}`);
  const qFull = block.querySelector('.q-full');

  const existing = qFull.querySelector('.options');
  if (existing) existing.remove();

  const wrapper = document.createElement('div');
  wrapper.className = 'options';

  step.options.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (usedWrong.includes(i) ? ' used' : '');
    btn.disabled = usedWrong.includes(i);
    btn.innerHTML = `<span class="opt-key">${String.fromCharCode(65 + i)}</span><span class="opt-text">${text}</span>`;
    btn.addEventListener('click', () => handleAnswer(chapterIdx, stepIdx, i, usedWrong));
    wrapper.appendChild(btn);
  });

  qFull.appendChild(wrapper);
  activeQuestion = { chapterIdx, stepIdx, prevWrong: usedWrong };
}

// Append a feedback bubble inside .q-full (same flow as user bubbles)
/* ── CONTINUE TIMER BUTTON ─────────────────────────────────────
   Shows a "Continue" button inside groupEl's q-full area.
   A ring counts down DURATION_MS, then auto-resolves.
   Clicking early resolves immediately.
──────────────────────────────────────────────────────────────── */

function awaitContinueTimer(groupEl, durationMs = 3000) {
  const qFull = groupEl.querySelector('.q-full');
  const qb    = groupEl.querySelector('.question-block');

  const RADIUS = 10;
  const CIRC   = 2 * Math.PI * RADIUS; // ≈ 62.83

  const wrap = document.createElement('div');
  wrap.className = 'q-continue-wrap';

  wrap.innerHTML = `
    <button class="q-continue-btn">
      <span class="q-timer-ring">
        <svg width="26" height="26" viewBox="0 0 26 26">
          <circle class="q-timer-track" cx="13" cy="13" r="${RADIUS}"/>
          <circle class="q-timer-progress" cx="13" cy="13" r="${RADIUS}"
            stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
        </svg>
        <span class="q-timer-count">3</span>
      </span>
      Continue
    </button>`;

  qFull.appendChild(wrap);
  if (qb) qb.scrollTop = qb.scrollHeight;

  const btn      = wrap.querySelector('.q-continue-btn');
  const progress = wrap.querySelector('.q-timer-progress');
  const countEl  = wrap.querySelector('.q-timer-count');

  return new Promise(resolve => {
    const start   = performance.now();
    let   rafId   = null;
    let   settled = false;

    function finish() {
      if (settled) return;
      settled = true;
      cancelAnimationFrame(rafId);
      wrap.remove();
      resolve();
    }

    function tick(now) {
      const elapsed  = now - start;
      const fraction = Math.min(elapsed / durationMs, 1);
      progress.style.strokeDashoffset = (CIRC * fraction).toFixed(2);
      const secsLeft = Math.ceil((durationMs - elapsed) / 1000);
      countEl.textContent = Math.max(secsLeft, 0);
      if (fraction >= 1) { finish(); return; }
      rafId = requestAnimationFrame(tick);
    }

    btn.addEventListener('click', finish, { once: true });
    rafId = requestAnimationFrame(tick);
  });
}

function playCompletionSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ctx.createGain();
    master.gain.value = 0.18;
    master.connect(ctx.destination);

    // Rising arpeggio: C5 → E5 → G5 → C6
    const freqs = [523.25, 659.25, 783.99, 1046.5];
    freqs.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(master);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(1, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
      osc.start(t);
      osc.stop(t + 1.2);
    });
  } catch(e) { /* AudioContext blocked — silent */ }
}

  const card = document.getElementById(`card-${chapterIdx}`);
  const head = card.querySelector('.card-head');

  card.classList.add(hasSkipped ? 'completing-partial' : 'completing');
  if (!hasSkipped) playCompletionSound();
  await delay(750);
  card.classList.remove('completing', 'completing-partial');
  card.classList.add(hasSkipped ? 'partial' : 'completed');

  const badge = document.createElement('div');
  if (hasSkipped) {
    const n = allSkipped.filter(s => s.chapterIdx === chapterIdx).length;
    badge.className = 'card-complete-badge skipped';
    badge.innerHTML = `<span class="badge-label">${n} skipped</span>`;
  } else {
    badge.className = 'card-complete-badge';
    badge.innerHTML = `<div class="badge-check">✓</div><span class="badge-label">Complete</span>`;
  }
  head.appendChild(badge);
}

function appendTrainingDone(feedId) {
  const feed = document.getElementById(feedId);
  const wrapper = document.createElement('div');
  wrapper.className = 'training-done';
  wrapper.innerHTML = `
    <div class="done-circle">✓</div>
    <div>
      <div class="done-title">Seder<br>Complete</div>
      <div class="done-subtitle" style="margin-top: 10px;">Cataract Surgery Preparation Protocol — All chapters completed</div>
    </div>
  `;
  feed.appendChild(wrapper);
  bounceIn(wrapper);
  setActive(feed, wrapper);
}

function awaitMaterialNext(feedId) {
  const feed = document.getElementById(feedId);
  const focusedBlock = feed.querySelector('.in-focus');

  // ↓ button lives in the FEED, BELOW the active block (not inside it)
  const wrap = document.createElement('div');
  wrap.className = 'content-block-next';
  const btn = document.createElement('button');
  btn.className = 'material-next-btn';
  btn.innerHTML = '↓';
  wrap.appendChild(btn);
  feed.appendChild(wrap);
  bounceIn(btn);
  // No extra scroll needed — setActive already reserved space for this button.

  return new Promise(resolve => {
    btn.addEventListener('click', () => {
      wrap.remove();
      if (focusedBlock) {
        focusedBlock.classList.remove('in-focus');
        focusedBlock.style.flex = '';
      }
      hideGlobalInput(feedId);
      activeMaterialBlock = null;
      resolve();
    }, { once: true });
  });
}

/* ───────────────────────────────────────────
   STEP RUNNER
─────────────────────────────────────────── */
async function runStep(chapterIdx, stepIdx, skipPause) {
  const chapter = CHAPTERS[chapterIdx];
  if (stepIdx >= chapter.steps.length) {
    await completeChapter(chapterIdx);
    return;
  }

  const step = chapter.steps[stepIdx];
  const feedId = `feed-${chapterIdx}`;

  /* Always highlight the pill this step belongs to */
  setCurrentSeg(chapterIdx, stepToPill(chapterIdx, stepIdx));

  if (step.type === 'content') {
    if (step.kind === 'video') {
      await appendVideoBlock(feedId, step);
    } else {
      const nextStep = chapter.steps[stepIdx + 1];
      const willPause = !skipPause && (step.pause || (nextStep && (nextStep.type === 'question' || nextStep.type === 'freetext')));
      await appendMoMessage(feedId, 'content', step.text, step.label || null, step.kind || 'material', willPause, step.illustration || null, step.textAfterImage || null);
      // Audio block (rendered after text block; its own ↓ replaces the material continue)
      if (step.audio) {
        await appendAudioBlock(feedId, step, skipPause);
      } else if (willPause) {
        await awaitMaterialNext(feedId);
      }
    }
    advanceProgress(chapterIdx);
    await delay(400);
    await runStep(chapterIdx, stepIdx + 1);

  } else if (step.type === 'freetext') {
    await showFreeTextQuestion(chapterIdx, stepIdx);
    await runStep(chapterIdx, stepIdx + 1);
  } else if (step.type === 'question') {
    await showQuestion(chapterIdx, stepIdx);
  }
}

async function handleAnswer(chapterIdx, stepIdx, optionIdx, prevWrong, userText = null) {
  activeQuestion = null;
  activeMaterialBlock = null;
  const step = CHAPTERS[chapterIdx].steps[stepIdx];
  const feed = document.getElementById(`feed-${chapterIdx}`);
  const group = document.getElementById(`qgroup-${chapterIdx}-${stepIdx}`);
  const block = document.getElementById(`qblock-${chapterIdx}-${stepIdx}`);
  const qFull = block.querySelector('.q-full');

  // Show user's typed answer as a bubble inside the question block, before processing
  let userBubble = null;
  if (userText) {
    userBubble = document.createElement('div');
    userBubble.className = 'q-user-bubble';
    userBubble.textContent = userText;
    qFull.appendChild(userBubble);
    bounceIn(userBubble);
    block.scrollTop = block.scrollHeight;
    await delay(400);
  }

  // Disable all options while processing
  block.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const clicked = block.querySelectorAll('.opt')[optionIdx];

  if (optionIdx === step.correct) {
    clicked.classList.add('correct');
    completedQuestions[chapterIdx]++;
    markSegment(chapterIdx);
    advanceProgress(chapterIdx);

    const responses = [
      "Correct. That's the right answer.",
      "Precisely. Well noted.",
      "That's correct — let's continue.",
      "Right. Moving on.",
    ];
    await delay(500);
    // Feedback goes INTO the group — it will collapse with the question
    await appendFeedbackToGroup(group, 'correct', 'Correct', responses[Math.floor(Math.random() * responses.length)]);

    // Show continue button with 3-second countdown timer
    await awaitContinueTimer(group, 3000);

    // Human-language collapsed title: strip the question's trailing "?" and append answer
    const qShort = step.text.replace(/\?$/, '');
    const humanTitle = `${qShort}: ${step.options[optionIdx].toLowerCase()}`;
    const answerEl = document.getElementById(`qanswer-${chapterIdx}-${stepIdx}`);
    if (answerEl) answerEl.textContent = humanTitle;

    // Collapse question card
    hideGlobalInput(`feed-${chapterIdx}`);
    group.classList.remove('in-focus');
    group.style.flex = '';
    group.classList.add('collapsed');
    group.addEventListener('click', () => group.classList.toggle('open'));

    await delay(300);
    await runStep(chapterIdx, stepIdx + 1);

  } else {
    clicked.classList.add('wrong');
    await delay(300);
    // Feedback goes INTO the group
    await appendFeedbackToGroup(group, 'wrong', 'Incorrect', step.wrongFeedback);
    await delay(400);

    // Refresh options in block (question text stays, wrong option disabled)
    renderOptions(chapterIdx, stepIdx, [...prevWrong, optionIdx]);
    // Re-anchor all chat nodes (bubbles + feedback) after the new options, preserving order
    qFull.querySelectorAll('.q-user-bubble, .q-feedback-row').forEach(b => qFull.appendChild(b));
  }
}

async function handleSkip(chapterIdx, stepIdx) {
  activeQuestion = null;
  const step = CHAPTERS[chapterIdx].steps[stepIdx];
  const group = document.getElementById(`qgroup-${chapterIdx}-${stepIdx}`);
  const answerEl = document.getElementById(`qanswer-${chapterIdx}-${stepIdx}`);
  const iconEl = group.querySelector('.q-summary-icon');

  allSkipped.push({ chapterIdx, step });
  skippedQCount[chapterIdx]++;
  markSkippedSegment(chapterIdx);

  if (answerEl) answerEl.textContent = step.text.replace(/\?$/, '');
  if (iconEl) iconEl.textContent = '→';

  // Clear global input bar and collapse group
  hideGlobalInput(`feed-${chapterIdx}`);
  group.classList.remove('in-focus');
  group.style.flex = '';

  group.classList.add('collapsed', 'skipped');
  group.addEventListener('click', () => group.classList.toggle('open'));
  advanceProgress(chapterIdx);
  if (group._resolve) {
    group._resolve();
  } else {
    await runStep(chapterIdx, stepIdx + 1);
  }
}

async function completeChapter(chapterIdx) {
  const feedId = `feed-${chapterIdx}`;
  const hasSkipped = allSkipped.some(s => s.chapterIdx === chapterIdx);
  await appendChapterComplete(feedId, chapterIdx, hasSkipped);
  await delay(700);

  const nextIdx = chapterIdx + 1;
  if (nextIdx < CHAPTERS.length) {
    unlockChapter(nextIdx);
    goToChapter(nextIdx);
    await delay(600);
    await runStep(nextIdx, 0);
  } else {
    await delay(200);
    if (allSkipped.length > 0) {
      appendFinishScreen(`feed-${chapterIdx}`);
    } else {
      appendTrainingDone(`feed-${chapterIdx}`);
    }
  }
}

function appendFinishScreen(feedId) {
  const feed = document.getElementById(feedId);
  const count = allSkipped.length;
  const chapterList = [...new Set(allSkipped.map(s => `Ch. ${CHAPTERS[s.chapterIdx].roman}`))].join(', ');
  const wrapper = document.createElement('div');
  wrapper.className = 'finish-screen';
  wrapper.innerHTML = `
    <div class="done-circle" style="border-color:var(--amber);color:var(--amber)">!</div>
    <div>
      <div class="done-title">Good<br>Progress.</div>
      <div class="done-subtitle" style="margin-top:10px">${count} skipped question${count !== 1 ? 's' : ''} — ${chapterList}</div>
      <div class="done-subtitle" style="margin-top:6px">Complete them to finish your training.</div>
    </div>
    <button class="finish-btn" id="finishBtn">Finish</button>
  `;
  feed.appendChild(wrapper);
  bounceIn(wrapper);
  setActive(feed, wrapper);
  document.getElementById('finishBtn').addEventListener('click', () => {
    wrapper.remove();
    buildLeftoversCard();
  });
}

async function buildLeftoversCard() {
  const track = document.getElementById('track');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-leftovers';
  card.innerHTML = `
    <div class="card-head">
      <span class="card-chapter">Leftovers</span>
      <span class="card-slash">//</span>
      <span class="card-title">Unfinished Questions</span>
    </div>
    <div class="feed" id="feed-leftovers"></div>
  `;
  track.appendChild(card);
  goToCard(card);
  await delay(600);

  const queue = allSkipped.splice(0);
  for (const { chapterIdx, step } of queue) {
    await showReviewQuestion('feed-leftovers', chapterIdx, step);
  }

  // All leftovers answered
  const head = card.querySelector('.card-head');
  card.classList.add('completing');
  playCompletionSound();
  await delay(750);
  card.classList.remove('completing');
  card.classList.add('completed');
  const badge = document.createElement('div');
  badge.className = 'card-complete-badge';
  badge.innerHTML = `<div class="badge-check">✓</div><span class="badge-label">Complete</span>`;
  head.appendChild(badge);
  await delay(400);
  appendTrainingDone('feed-leftovers');
}

function showReviewQuestion(feedId, chapterIdx, step) {
  const feed = document.getElementById(feedId);

  const group = document.createElement('div');
  group.className = 'q-group';

  const block = document.createElement('div');
  block.className = 'question-block';
  block.innerHTML = `
    <div class="q-summary">
      <div class="q-summary-icon">✓</div>
      <div class="q-summary-title"></div>
      <div class="q-toggle"></div>
    </div>
    <div class="q-full">
      <div class="q-text"></div>
    </div>
  `;

  group.appendChild(block);
  feed.appendChild(group);
  bounceIn(group);
  setActive(feed, group);

  // Returns a Promise that resolves only after the question is correctly answered
  return new Promise(resolve => {
    typeInto(block.querySelector('.q-text'), step.text).then(() => {
      renderReviewOptions(feedId, chapterIdx, step, group, block, [], resolve);
      setActive(feed, group);
    });
  });
}

function renderReviewOptions(feedId, chapterIdx, step, group, block, usedWrong, resolve) {
  const qFull = block.querySelector('.q-full');
  const existing = qFull.querySelector('.options');
  if (existing) existing.remove();

  const wrapper = document.createElement('div');
  wrapper.className = 'options';

  step.options.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (usedWrong.includes(i) ? ' used' : '');
    btn.disabled = usedWrong.includes(i);
    btn.innerHTML = `<span class="opt-key">${String.fromCharCode(65 + i)}</span><span class="opt-text">${text}</span>`;
    btn.addEventListener('click', () => handleReviewAnswer(feedId, chapterIdx, step, group, block, i, usedWrong, resolve));
    wrapper.appendChild(btn);
  });
  qFull.appendChild(wrapper);
}

async function handleReviewAnswer(feedId, chapterIdx, step, group, block, optionIdx, prevWrong, resolve) {
  const feed = document.getElementById(feedId);
  block.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const clicked = block.querySelectorAll('.opt')[optionIdx];

  if (optionIdx === step.correct) {
    clicked.classList.add('correct');
    completedQuestions[chapterIdx]++;
    markSegment(chapterIdx);

    const responses = [
      "Correct. That's the right answer.",
      "Precisely. Well noted.",
      "That's correct — let's continue.",
      "Right. Moving on.",
    ];
    await delay(300);
    await appendFeedbackToGroup(group, 'correct', 'Correct', responses[Math.floor(Math.random() * responses.length)]);
    await delay(400);

    const summaryTitle = group.querySelector('.q-summary-title');
    if (summaryTitle) summaryTitle.textContent = step.text.replace(/\?$/, '') + ': ' + step.options[optionIdx].toLowerCase();
    group.classList.add('collapsed');
    group.addEventListener('click', () => group.classList.toggle('open'));
    resolve();
  } else {
    clicked.classList.add('wrong');
    await delay(300);
    await appendFeedbackToGroup(group, 'wrong', 'Incorrect', step.wrongFeedback);
    await delay(400);
    renderReviewOptions(feedId, chapterIdx, step, group, block, [...prevWrong, optionIdx], resolve);
  }
}

function goToCard(card) {
  const track = document.getElementById('track');
  const idx = Array.from(track.children).indexOf(card);
  centerCardInViewport(card);
  // Mark all cards inactive except this one
  Array.from(track.children).forEach((c, i) => c.classList.toggle('inactive', i !== idx));
}

/* ───────────────────────────────────────────
   INIT
─────────────────────────────────────────── */
/* ───────────────────────────────────────────
   THEME TOGGLE
─────────────────────────────────────────── */
(function initTheme() {
  const saved = localStorage.getItem('morpheus-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('morpheus-theme', next);
  });

  // Settings panel toggle
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel  = document.getElementById('settingsPanel');
  settingsToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = settingsPanel.classList.toggle('open');
    settingsToggle.classList.toggle('active', open);
  });
  document.addEventListener('click', () => {
    settingsPanel.classList.remove('open');
    settingsToggle.classList.remove('active');
  });
  settingsPanel.addEventListener('click', e => e.stopPropagation());

  // Settings — theme item delegates to themeToggle
  document.getElementById('settingsThemeItem').addEventListener('click', () => {
    document.getElementById('themeToggle').click();
  });

  // Settings — reset progress
  document.getElementById('settingsResetItem').addEventListener('click', () => {
    if (confirm('Reset all progress and restart the course?')) location.reload();
  });
})();

buildDOM();

/* ── WELCOME → START flow ── */
document.getElementById('startCourseBtn').addEventListener('click', () => {
  const overlay = document.getElementById('welcomeOverlay');
  overlay.classList.add('exit');

  // After popup scrolls out, reveal the UI
  setTimeout(() => {
    overlay.classList.add('hidden');
    document.body.classList.remove('pre-start');
    document.body.classList.add('revealing');
    goToChapter(0);
    runStep(0, 0);

    // Clean up animation classes after they finish
    setTimeout(() => {
      document.body.classList.remove('revealing');
    }, 1200);
  }, 600);
});

/* ── TOC ── */
function buildToc() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';

  CHAPTERS.forEach((ch, i) => {
    const locked = !unlockedChapters.has(i);
    const isActive = i === currentChapter;
    const done = completedQuestions[i];
    const skipped = skippedQCount[i];

    // Track how many questions we've seen to know their state
    let qSeen = 0;

    const section = document.createElement('div');
    section.className = ['toc-chapter', locked ? 'locked' : '', isActive ? 'active' : ''].filter(Boolean).join(' ');

    const head = document.createElement('div');
    head.className = 'toc-chapter-head';
    head.innerHTML = `<span class="toc-roman">Ch. ${ch.roman}</span><span class="toc-name">${ch.title}</span>`;
    if (!locked) {
      head.style.cursor = 'pointer';
      head.addEventListener('click', () => { goToChapter(i); closeToc(); });
    }
    section.appendChild(head);

    const steps = document.createElement('div');
    steps.className = 'toc-steps';

    ch.steps.forEach(step => {
      const row = document.createElement('div');

      if (step.type === 'content') {
        const label = step.label || (step.kind === 'video' ? 'Video' : 'Material');
        const text = step.kind === 'video' ? step.videoTitle : step.text;
        row.className = 'toc-step';
        row.innerHTML = `
          <span class="toc-step-dot"></span>
          <span class="toc-step-label">${label}</span>
          <span class="toc-step-text">${text}</span>
        `;
      } else {
        return;
      }

      steps.appendChild(row);
    });

    section.appendChild(steps);
    list.appendChild(section);
  });
}

function openToc() {
  buildToc();
  document.getElementById('tocPanel').classList.add('open');
  document.getElementById('tocOverlay').classList.add('open');
  document.getElementById('tocToggle').classList.add('open');
}

function closeToc() {
  document.getElementById('tocPanel').classList.remove('open');
  document.getElementById('tocOverlay').classList.remove('open');
  document.getElementById('tocToggle').classList.remove('open');
}

document.getElementById('tocToggle').addEventListener('click', () => {
  document.getElementById('tocPanel').classList.contains('open') ? closeToc() : openToc();
});
document.getElementById('tocOverlay').addEventListener('click', closeToc);

</script>
